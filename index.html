<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بطاقات الحرب الباردة · بكالوريا</title>
  <!-- Tailwind + RTL support -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Cairo (professional Arabic font) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Cairo', sans-serif; }
    body { background: #0b0f19; }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e2636; }
    ::-webkit-scrollbar-thumb { background: #3b4b66; border-radius: 10px; }
    /* Flip utilities */
    .perspective-1000 { perspective: 1200px; }
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    /* Glassmorphism touches */
    .glass-card {
      background: rgba(20, 28, 40, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(56, 78, 110, 0.3);
    }
    .quiz-option {
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .quiz-option:active { transform: scale(0.97); }
    .bg-pattern {
      background-image: radial-gradient(circle at 25% 30%, rgba(30, 64, 175, 0.08) 0%, transparent 30%),
                        radial-gradient(circle at 75% 70%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-slate-200 antialiased bg-pattern">

  <div id="root" class="min-h-screen"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // -------------------------------------------------------------
    // البيانات بعد تنسيق التواريخ حسب الطلب: "14 جانفي 1945"
    // (مع الحفاظ على صيغ الفترات التاريخية كما هي)
    // -------------------------------------------------------------
    const rawData = [
      { date: "4 - 11 فيفري 1945", event: "مؤتمر يالطا بين الو.م.أ - الإتحاد السوفياتي - بريطانيا." },
      { date: "17 جويلية - 02 أوت 1945", event: "مؤتمر بوتسدام (بريطانيا - السوفيات - الو.م.أ) أقر تقسيم ألمانيا." },
      { date: "6 - 9 أوت 1945", event: "تفجير قنبلتي هيروشيما وناغازاكي باليابان." },
      { date: "24 أكتوبر 1945", event: "تأسيس هيئة الأمم المتحدة." },
      { date: "12 مارس 1947", event: "الإعلان عن مبدأ هاري ترومان." },
      { date: "5 جوان 1947", event: "الإعلان عن مشروع جورج مارشال." },
      { date: "22 سبتمبر 1947", event: "الإعلان عن مبدأ جدانوف." },
      { date: "6 أكتوبر 1947", event: "إنشاء مكتب الكومنفورم." },
      { date: "3 جوان 1948", event: "اجتماع لندن وتأسيس حكومة رأسمالية في بون الألمانية." },
      { date: "23 جوان 1948", event: "حصار السوفيات لبرلين." },
      { date: "25 جوان 1948", event: "إنشاء جسر جوي إلى برلين وفك الحصار عنها." },
      { date: "25 جانفي 1949", event: "تأسيس منظمة الكوميكون." },
      { date: "8 ماي 1949", event: "تأسيس ألمانيا الغربية الرأسمالية الاتحادية عاصمتها بون." },
      { date: "12 ماي 1949", event: "رفع الحصار عن برلين." },
      { date: "7 أكتوبر 1949", event: "تأسيس ألمانيا الديمقراطية الشرقية الشيوعية عاصمتها برلين الشرقية." },
      { date: "4 أفريل 1949", event: "تأسيس حلف الشمال الأطلسي (الناتو)." },
      { date: "1 أكتوبر 1949", event: "نجاح الثورة الشيوعية الصينية." },
      { date: "25 جوان 1950", event: "اندلاع الحرب الكورية بغزو القسم الشمالي للجنوب." },
      { date: "1 سبتمبر 1951", event: "تأسيس حلف الأنزيس." },
      { date: "5 مارس 1953", event: "وفاة الزعيم السوفياتي ستالين." },
      { date: "27 جويلية 1953", event: "نهاية الحرب الأهلية الكورية." },
      { date: "8 سبتمبر 1954", event: "تأسيس حلف جنوب شرق آسيا (السياتو)." },
      { date: "24 فيفري 1955", event: "تأسيس حلف بغداد." },
      { date: "18 - 24 أفريل 1955", event: "مؤتمر باندونغ." },
      { date: "5 ماي 1955", event: "اعتراف السوفيات بألمانيا الغربية الإتحادية." },
      { date: "14 ماي 1955", event: "تأسيس حلف وارسو." },
      { date: "14 فيفري 1956", event: "تبني خروتشوف سياسة التعايش السلمي." },
      { date: "17 أفريل 1956", event: "حل مكتب الكومنفورم." },
      { date: "29 أكتوبر 1956", event: "العدوان الثلاثي على مصر." },
      { date: "5 نوفمبر 1956", event: "تهديد السوفيات باستعمال السلاح النووي ضد دول العدوان الثلاثي." },
      { date: "5 جانفي 1957", event: "الإعلان عن مشروع أيزنهاور." },
      { date: "13 أوت 1961", event: "بناء جدار برلين." },
      { date: "15 - 18 سبتمبر 1959", event: "زيارة خروتشوف إلى واشنطن." },
      { date: "1 - 6 سبتمبر 1961", event: "تأسيس حركة عدم الانحياز ببلغراد بيوغسلافيا." },
      { date: "7 فيفري 1962", event: "فرض الحصار الاقتصادي الأمريكي على كوبا." },
      { date: "22 أكتوبر 1962", event: "فرض الحصار العسكري الأمريكي على كوبا." },
      { date: "28 أكتوبر 1962", event: "قرار سحب السوفيات للصواريخ من كوبا ونهاية الأزمة الكوبية." },
      { date: "20 جوان 1963", event: "إنشاء الخط الهاتفي الأحمر." },
      { date: "26 ماي 1972", event: "توقيع اتفاقية سالت الأولى للحد من الأسلحة الإستراتيجية." },
      { date: "5 - 9 سبتمبر 1973", event: "المؤتمر الرابع لحركة عدم الانحياز بالجزائر." },
      { date: "18 جوان 1979", event: "توقيع اتفاقية سالت الثانية بفيينا." },
      { date: "27 ديسمبر 1979", event: "تدخل السوفيات عسكريا في أفغانستان." },
      { date: "3 - 4 ديسمبر 1989", event: "مؤتمر مالطا بين غورباتشوف وجورج بوش والإعلان عن زوال القطبية الثنائية." },
      { date: "9 نوفمبر 1989", event: "تحطيم جدار برلين." },
      { date: "3 أكتوبر 1990", event: "توحيد الألمانيتين." },
      { date: "19 - 21 نوفمبر 1990", event: "مؤتمر باريس وإعلان نهاية الحرب الباردة رسميا." },
      { date: "28 جوان 1991", event: "حل منظمة الكوميكون." },
      { date: "1 جويلية 1991", event: "حل حلف وارسو." },
      { date: "5 سبتمبر 1991", event: "حل الحزب الشيوعي السوفياتي." },
      { date: "21 ديسمبر 1991", event: "مؤتمر 'ألما آتا' وزوال الإتحاد السوفياتي وظهور الجمهوريات المستقلة." },
      { date: "25 ديسمبر 1991", event: "استقالة غورباتشوف من رئاسة الإتحاد السوفياتي." }
    ];

    // وظيفة مساعدة لتنظيف الصيغ (إزالة أصفار زائدة من الأيام فقط إن وجدت)
    const formatDateDisplay = (dateStr) => {
      // نحافظ على النص كما هو تقريباً، فقط نضمن أن الأيام لا تبدأ بصفر غير ضروري
      // لكن البيانات اليدوية أعلاه مضبوطة مسبقاً.
      return dateStr;
    };

    const historyData = rawData.map(item => ({
      ...item,
      date: formatDateDisplay(item.date)
    }));

    // ----------------------  المكون الرئيسي  -----------------------
    function App() {
      const [activeTab, setActiveTab] = useState('flashcards');

      return (
        <div dir="rtl" className="min-h-screen flex flex-col">
          {/* شريط التنقل – بدون عنوان "تاريخ البكالوريا" */}
          <nav className="sticky top-0 z-50 glass-card border-b border-slate-700/40 shadow-lg shadow-black/5">
            <div className="max-w-5xl mx-auto px-5 py-3 flex items-center justify-between">
              {/* المساحة اليسرى فارغة لإزالة العنوان */}
              <div className="w-10"></div> 
              
              <div className="flex items-center gap-2 bg-slate-800/50 p-1 rounded-2xl backdrop-blur-sm border border-slate-700/60">
                <button
                  onClick={() => setActiveTab('flashcards')}
                  className={`px-6 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 ${
                    activeTab === 'flashcards'
                      ? 'bg-gradient-to-l from-blue-600 to-blue-500 text-white shadow-lg shadow-blue-900/30'
                      : 'text-slate-300 hover:text-white hover:bg-slate-700/60'
                  }`}
                >
                  📇 البطاقات التعليمية
                </button>
                <button
                  onClick={() => setActiveTab('quiz')}
                  className={`px-6 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 ${
                    activeTab === 'quiz'
                      ? 'bg-gradient-to-l from-emerald-600 to-emerald-500 text-white shadow-lg shadow-emerald-900/30'
                      : 'text-slate-300 hover:text-white hover:bg-slate-700/60'
                  }`}
                >
                  🧠 اختبر معارفك
                </button>
              </div>
              <div className="w-10"></div> {/* للتوازن */}
            </div>
          </nav>

          {/* المحتوى الرئيسي */}
          <main className="flex-1 max-w-6xl w-full mx-auto px-4 py-8 md:py-12">
            <div className="transition-all duration-500">
              {activeTab === 'flashcards' ? <FlashcardsView /> : <QuizView />}
            </div>
          </main>
          
          {/* تذييل صغير أنيق */}
          <footer className="py-4 text-center text-slate-500 text-xs border-t border-slate-800/50">
            <span className="opacity-60">⚡ بكالوريا · مراجعة الحرب الباردة</span>
          </footer>
        </div>
      );
    }

    // ----------------------  مكون البطاقات  -----------------------
    function FlashcardsView() {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [cards, setCards] = useState([...historyData]);

      useEffect(() => {
        setIsFlipped(false);
      }, [currentIndex]);

      const handleNext = () => {
        if (currentIndex < cards.length - 1) {
          setCurrentIndex(prev => prev + 1);
        }
      };

      const handlePrev = () => {
        if (currentIndex > 0) {
          setCurrentIndex(prev => prev - 1);
        }
      };

      const shuffleCards = () => {
        const shuffled = [...historyData].sort(() => Math.random() - 0.5);
        setCards(shuffled);
        setCurrentIndex(0);
        setIsFlipped(false);
      };

      return (
        <div className="flex flex-col items-center w-full max-w-3xl mx-auto">
          {/* رأس البطاقة مع العداد */}
          <div className="w-full flex justify-between items-center mb-6 text-slate-400">
            <span className="text-sm font-medium bg-slate-800/70 backdrop-blur-sm px-4 py-1.5 rounded-full border border-slate-700/60">
              📌 بطاقة {currentIndex + 1} من {cards.length}
            </span>
            <button 
              onClick={shuffleCards} 
              className="text-sm hover:text-blue-400 transition-all flex items-center gap-2 bg-slate-800/40 hover:bg-slate-700/60 px-4 py-1.5 rounded-full backdrop-blur-sm border border-slate-700/40"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
              </svg>
              خلط البطاقات
            </button>
          </div>

          {/* بطاقة الـ Flip ثلاثية الأبعاد */}
          <div 
            className="relative w-full h-[420px] perspective-1000 cursor-pointer group"
            onClick={() => setIsFlipped(!isFlipped)}
          >
            <div className={`w-full h-full duration-700 preserve-3d relative transition-transform ${isFlipped ? 'rotate-y-180' : ''}`}>
              
              {/* الوجه الأمامي – التاريخ */}
              <div className="absolute w-full h-full backface-hidden rounded-3xl shadow-2xl overflow-hidden border border-slate-700/50 bg-gradient-to-br from-slate-900 to-slate-800 flex flex-col items-center justify-center p-8 text-center">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-l from-blue-500/60 to-cyan-500/40"></div>
                <span className="text-blue-300/80 mb-4 font-semibold tracking-widest text-sm">📅 التـاريخ</span>
                <h2 className="text-4xl md:text-5xl font-bold text-white leading-tight px-4" dir="ltr">
                  {cards[currentIndex].date}
                </h2>
                <div className="absolute bottom-8 text-slate-400 text-sm flex items-center gap-1 animate-pulse">
                  <span>انقر لقلب البطاقة</span>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"></path></svg>
                </div>
              </div>

              {/* الوجه الخلفي – الحدث */}
              <div className="absolute w-full h-full backface-hidden rotate-y-180 rounded-3xl shadow-2xl overflow-hidden border border-emerald-800/40 bg-gradient-to-br from-emerald-950/90 via-slate-900 to-slate-900 flex flex-col items-center justify-center p-8 text-center">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-l from-emerald-400 to-green-500"></div>
                <span className="text-emerald-300/90 mb-4 font-semibold tracking-widest text-sm">📋 الحــدث</span>
                <p className="text-2xl md:text-3xl font-medium text-white leading-relaxed px-4">
                  {cards[currentIndex].event}
                </p>
              </div>
            </div>
          </div>

          {/* أزرار التنقل */}
          <div className="flex gap-5 mt-10 w-full">
            <button
              onClick={handlePrev}
              disabled={currentIndex === 0}
              className="flex-1 bg-slate-800/80 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed text-white py-4 rounded-2xl font-semibold transition-all flex justify-center items-center gap-3 border border-slate-700/70 backdrop-blur-sm shadow-lg"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
              السابق
            </button>
            <button
              onClick={handleNext}
              disabled={currentIndex === cards.length - 1}
              className="flex-1 bg-gradient-to-r from-blue-700 to-blue-600 hover:from-blue-600 hover:to-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-4 rounded-2xl font-semibold transition-all flex justify-center items-center gap-3 shadow-lg shadow-blue-900/20 border border-blue-500/30"
            >
              التالي
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
          </div>
        </div>
      );
    }

    // ----------------------  مكون الاختبار  -----------------------
    function QuizView() {
      const [questions, setQuestions] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isAnswering, setIsAnswering] = useState(false);

      const startQuiz = () => {
        const shuffledData = [...historyData].sort(() => 0.5 - Math.random());
        const selected = shuffledData.slice(0, 10);
        
        const generatedQuestions = selected.map(correctItem => {
          const wrongAnswers = historyData
            .filter(item => item.date !== correctItem.date)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);
            
          const options = [correctItem, ...wrongAnswers].sort(() => 0.5 - Math.random());
          
          return {
            question: correctItem.event,
            correctDate: correctItem.date,
            options: options.map(opt => opt.date)
          };
        });

        setQuestions(generatedQuestions);
        setCurrentQIndex(0);
        setScore(0);
        setShowResult(false);
        setSelectedAnswer(null);
        setIsAnswering(false);
      };

      useEffect(() => {
        startQuiz();
      }, []);

      const handleAnswer = (selectedDate) => {
        if (isAnswering) return;
        
        setIsAnswering(true);
        setSelectedAnswer(selectedDate);
        
        const isCorrect = selectedDate === questions[currentQIndex].correctDate;
        if (isCorrect) setScore(prev => prev + 1);

        setTimeout(() => {
          if (currentQIndex + 1 < questions.length) {
            setCurrentQIndex(prev => prev + 1);
            setSelectedAnswer(null);
            setIsAnswering(false);
          } else {
            setShowResult(true);
          }
        }, 1400);
      };

      if (questions.length === 0) return <div className="text-center py-20 text-slate-400">⏳ جاري تحضير الأسئلة...</div>;

      if (showResult) {
        const percentage = (score / questions.length) * 100;
        let message = "📚 يحتاج إلى مراجعة أكثر";
        let colorClass = "text-amber-400";
        if (percentage >= 80) { message = "🏆 ممتاز! أنت مستعد للبكالوريا"; colorClass = "text-emerald-400"; }
        else if (percentage >= 50) { message = "📈 جيد، لكن ركّز أكثر"; colorClass = "text-sky-400"; }

        return (
          <div className="max-w-xl mx-auto glass-card rounded-3xl p-8 md:p-10 shadow-2xl text-center animate-in fade-in zoom-in duration-500 border border-slate-700/60">
            <h2 className="text-3xl font-bold text-white mb-4">نتيجة الاختبار</h2>
            <div className="text-8xl font-black my-6">
              <span className={colorClass}>{score}</span>
              <span className="text-slate-500 text-4xl mx-1">/</span>
              <span className="text-slate-300 text-5xl">{questions.length}</span>
            </div>
            <p className={`text-xl font-semibold mb-8 ${colorClass}`}>{message}</p>
            <button 
              onClick={startQuiz}
              className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-blue-900/30 text-lg"
            >
              🔄 إعادة الاختبار
            </button>
          </div>
        );
      }

      const currentQ = questions[currentQIndex];

      return (
        <div className="max-w-4xl mx-auto">
          {/* شريط التقدم */}
          <div className="mb-8">
            <div className="flex justify-between text-sm font-medium text-slate-400 mb-2">
              <span>❓ السؤال {currentQIndex + 1} / {questions.length}</span>
              <span>🏅 النقاط: {score}</span>
            </div>
            <div className="w-full bg-slate-800/80 rounded-full h-2.5 backdrop-blur-sm">
              <div 
                className="bg-gradient-to-r from-blue-500 to-cyan-400 h-2.5 rounded-full transition-all duration-700" 
                style={{ width: `${((currentQIndex + 1) / questions.length) * 100}%` }}
              ></div>
            </div>
          </div>

          {/* السؤال */}
          <div className="glass-card rounded-3xl p-6 md:p-10 shadow-xl mb-8 border border-slate-700/60">
            <span className="text-emerald-300 font-semibold text-sm mb-4 block">⏳ متى وقع هذا الحدث؟</span>
            <h2 className="text-2xl md:text-3xl font-bold text-white leading-relaxed">
              {currentQ.question}
            </h2>
          </div>

          {/* خيارات الإجابة */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {currentQ.options.map((optionDate, idx) => {
              let btnStyle = "bg-slate-800/70 backdrop-blur-sm border-slate-700/60 hover:bg-slate-700 text-slate-100";
              
              if (isAnswering) {
                if (optionDate === currentQ.correctDate) {
                  btnStyle = "bg-emerald-900/60 border-emerald-500 text-emerald-200 shadow-lg shadow-emerald-900/30";
                } else if (optionDate === selectedAnswer) {
                  btnStyle = "bg-rose-900/60 border-rose-500 text-rose-200 shadow-lg shadow-rose-900/30";
                } else {
                  btnStyle = "bg-slate-800/30 border-slate-800 text-slate-500 opacity-60";
                }
              }

              return (
                <button
                  key={idx}
                  onClick={() => handleAnswer(optionDate)}
                  disabled={isAnswering}
                  dir="ltr"
                  className={`quiz-option p-6 rounded-2xl border-2 text-xl font-bold transition-all duration-300 text-center shadow-md ${btnStyle}`}
                >
                  {optionDate}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // تحميل التطبيق
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
