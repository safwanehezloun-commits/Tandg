    // --- المكون الرئيسي (تم إضافة التبويب الثالث "اختبار التاريخ") ---
    function App() {
      const [activeTab, setActiveTab] = React.useState('flashcards');

      return (
        <div dir="rtl" className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30">

            <div className="max-w-4xl mx-auto px-4">
              <div className="flex justify-center items-center h-16">
                <div className="flex space-x-2 space-x-reverse bg-slate-800 p-1 rounded-lg">

                    onClick={() => setActiveTab('flashcards')}
                    className={`px-6 py-2 rounded-md text-sm font-bold transition-all duration-300 ${

                        ? 'bg-blue-600 text-white shadow-md'

                    }`}

                  </button>

                    onClick={() => setActiveTab('quiz')}

                        : 'text-slate-400 hover:text-white hover:bg-slate-700'
                    }`}
                  >

                    onClick={() => setActiveTab('reverseQuiz')}

                        ? 'bg-purple-600 text-white shadow-md'
                        : 'text-slate-400 hover:text-white hover:bg-slate-700'

          <main className="max-w-4xl mx-auto p-4 py-8">
            {activeTab === 'flashcards' && <FlashcardsView />}
            {activeTab === 'quiz' && <QuizView />}

          </main>

      );
    }

    // --- مكون البطاقات التعليمية (بدون تغيير) ---
    function FlashcardsView() {
      const [currentIndex, setCurrentIndex] = React.useState(0);
      const [isFlipped, setIsFlipped] = React.useState(false);

      React.useEffect(() => {
        setIsFlipped(false);
      }, [currentIndex]);

      const handleNext = () => {
        if (currentIndex < historyData.length - 1) {
          setCurrentIndex(prev => prev + 1);
        }
      };

      const handlePrev = () => {
        if (currentIndex > 0) {
          setCurrentIndex(prev => prev - 1);
        }
      };

      const shuffleCards = () => {
          historyData.sort(() => Math.random() - 0.5);
          setCurrentIndex(0);
          setIsFlipped(false);
      };

      return (
        <div className="flex flex-col items-center w-full max-w-2xl mx-auto">
          <div className="w-full flex justify-between items-center mb-6 text-slate-400">
            <span className="text-sm font-medium bg-slate-800 px-3 py-1 rounded-full">
              بطاقة {currentIndex + 1} من {historyData.length}
            </span>
            <button onClick={shuffleCards} className="text-sm hover:text-blue-400 transition-colors flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
              خلط البطاقات
            </button>
          </div>

          <div 
            className="relative w-full h-80 perspective-1000 cursor-pointer group"
            onClick={() => setIsFlipped(!isFlipped)}
          >
            <div className={`w-full h-full duration-500 preserve-3d relative transition-transform ${isFlipped ? 'rotate-y-180' : ''}`}>
              
              <div className="absolute w-full h-full backface-hidden bg-slate-800 rounded-2xl shadow-xl border border-slate-700/50 flex flex-col items-center justify-center p-8 text-center hover:border-blue-500/30 transition-colors">
                <span className="text-blue-400 mb-4 font-semibold text-sm tracking-wider">التاريخ</span>
                <h2 className="text-3xl md:text-4xl font-bold text-white leading-tight">
                  {historyData[currentIndex].date}
                </h2>
                <div className="absolute bottom-6 text-slate-500 text-sm animate-pulse">
                  انقر لقلب البطاقة
                </div>
              </div>

              <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-gradient-to-br from-blue-900 to-slate-900 rounded-2xl shadow-xl border border-blue-800/50 flex flex-col items-center justify-center p-8 text-center">
                <span className="text-emerald-400 mb-4 font-semibold text-sm tracking-wider">الحدث</span>
                <p className="text-2xl md:text-3xl font-medium text-white leading-relaxed">
                  {historyData[currentIndex].event}
                </p>
              </div>
            </div>
          </div>

          <div className="flex gap-4 mt-10 w-full">
            <button
              onClick={handleNext}
              disabled={currentIndex === historyData.length - 1}
              className="flex-1 bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed text-white py-4 rounded-xl font-medium transition-all flex justify-center items-center gap-2 border border-slate-700"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
              التالي
            </button>
            <button
              onClick={handlePrev}
              disabled={currentIndex === 0}
              className="flex-1 bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed text-white py-4 rounded-xl font-medium transition-all flex justify-center items-center gap-2 border border-slate-700"
            >
              السابق
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
          </div>
        </div>
      );
    }

    // --- مكون الاختبار الأصلي (حدث ← تاريخ) بدون تغيير ---
    function QuizView() {
      const [questions, setQuestions] = React.useState([]);
      const [currentQIndex, setCurrentQIndex] = React.useState(0);
      const [score, setScore] = React.useState(0);
      const [showResult, setShowResult] = React.useState(false);
      const [selectedAnswer, setSelectedAnswer] = React.useState(null);
      const [isAnswering, setIsAnswering] = React.useState(false);

      const startQuiz = () => {
        const shuffledData = [...historyData].sort(() => 0.5 - Math.random());
        const selected = shuffledData.slice(0, 10);
        
        const generatedQuestions = selected.map(correctItem => {
          const wrongAnswers = historyData
            .filter(item => item.date !== correctItem.date)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);
            
          const options = [correctItem, ...wrongAnswers].sort(() => 0.5 - Math.random());
          
          return {
            question: correctItem.event,
            correctDate: correctItem.date,
            options: options.map(opt => opt.date)
          };
        });

        setQuestions(generatedQuestions);
        setCurrentQIndex(0);
        setScore(0);
        setShowResult(false);
        setSelectedAnswer(null);
        setIsAnswering(false);
      };

      React.useEffect(() => {
        startQuiz();
      }, []);

      const handleAnswer = (selectedDate) => {
        if (isAnswering) return;
        
        setIsAnswering(true);
        setSelectedAnswer(selectedDate);
        
        const isCorrect = selectedDate === questions[currentQIndex].correctDate;
        if (isCorrect) {
          setScore(prev => prev + 1);
        }

        setTimeout(() => {
          if (currentQIndex + 1 < questions.length) {
            setCurrentQIndex(prev => prev + 1);
            setSelectedAnswer(null);
            setIsAnswering(false);
          } else {
            setShowResult(true);
          }
        }, 1500);
      };

      if (questions.length === 0) return <div className="text-center text-white mt-10">جاري التحضير...</div>;

      if (showResult) {
        const percentage = (score / questions.length) * 100;
        let message = "يحتاج إلى مراجعة أكثر";
        let colorClass = "text-red-400";
        if (percentage >= 80) { message = "ممتاز! أنت مستعد للبكالوريا"; colorClass = "text-emerald-400"; }
        else if (percentage >= 50) { message = "جيد، لكنك تحتاج للمزيد من التركيز"; colorClass = "text-yellow-400"; }

        return (
          <div className="max-w-xl mx-auto bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 text-center animate-in fade-in zoom-in duration-500">
            <h2 className="text-3xl font-bold text-white mb-2">نتيجة الاختبار</h2>
            <div className="text-7xl font-black mb-4 mt-6">
              <span className={colorClass}>{score}</span>
              <span className="text-slate-500 text-4xl">/{questions.length}</span>
            </div>
            <p className={`text-xl font-medium mb-8 ${colorClass}`}>{message}</p>
            <button 
              onClick={startQuiz}
              className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-blue-900/20"
            >
              إعادة الاختبار
            </button>
          </div>
        );
      }

      const currentQ = questions[currentQIndex];

      return (
        <div className="max-w-3xl mx-auto">
          <div className="mb-8">
            <div className="flex justify-between text-sm font-medium text-slate-400 mb-2">
              <span>السؤال {currentQIndex + 1} من {questions.length}</span>
              <span>النقاط: {score}</span>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-2.5">
              <div 
                className="bg-blue-500 h-2.5 rounded-full transition-all duration-500" 
                style={{ width: `${((currentQIndex + 1) / questions.length) * 100}%` }}
              ></div>
            </div>
          </div>

          <div className="bg-slate-800 rounded-3xl p-6 md:p-10 shadow-xl border border-slate-700 mb-6">
            <span className="text-emerald-400 font-semibold text-sm mb-4 block">متى وقع هذا الحدث؟</span>
            <h2 className="text-2xl md:text-3xl font-bold text-white leading-relaxed">
              {currentQ.question}
            </h2>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {currentQ.options.map((optionDate, idx) => {
              
              let btnStyle = "bg-slate-800 border-slate-700 hover:bg-slate-700 text-slate-200 hover:border-slate-500";
              
              if (isAnswering) {
                if (optionDate === currentQ.correctDate) {
                  btnStyle = "bg-emerald-900/50 border-emerald-500 text-emerald-400";
                } else if (optionDate === selectedAnswer) {
                  btnStyle = "bg-red-900/50 border-red-500 text-red-400";
                } else {
                  btnStyle = "bg-slate-800 border-slate-800 text-slate-500 opacity-50";
                }
              }

              return (
                <button
                  key={idx}
                  onClick={() => handleAnswer(optionDate)}
                  disabled={isAnswering}
                  className={`p-5 rounded-2xl border-2 text-lg font-bold transition-all duration-300 text-center shadow-sm ${btnStyle}`}
                >
                  {optionDate}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // --- المكون الجديد: الاختبار العكسي (تاريخ ← حدث) ---

        const percentage = (score / questions.length) * 100;

        if (percentage >= 80) { message = "ممتاز! أنت مستعد للبكالوريا"; colorClass = "text-emerald-400"; }

            <h2 className="text-3xl font-bold text-white mb-2">نتيجة اختبار التاريخ</h2>
            <div className="text-7xl font-black mb-4 mt-6">
              <span className={colorClass}>{score}</span>
              <span className="text-slate-500 text-4xl">/{questions.length}</span>
            </div>
            <p className={`text-xl font-medium mb-8 ${colorClass}`}>{message}</p>
            <button 
              onClick={startQuiz}
              className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-purple-900/20"
            >
              إعادة الاختبار
            </button>
          </div>
        );
      }

      const currentQ = questions[currentQIndex];

      return (
        <div className="max-w-3xl mx-auto">
          <div className="mb-8">
            <div className="flex justify-between text-sm font-medium text-slate-400 mb-2">
              <span>السؤال {currentQIndex + 1} من {questions.length}</span>
              <span>النقاط: {score}</span>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-2.5">
              <div 
                className="bg-purple-500 h-2.5 rounded-full transition-all duration-500" 
                style={{ width: `${((currentQIndex + 1) / questions.length) * 100}%` }}
              ></div>
            </div>
          </div>

          <div className="bg-slate-800 rounded-3xl p-6 md:p-10 shadow-xl border border-slate-700 mb-6">
            <span className="text-purple-400 font-semibold text-sm mb-4 block">ما الحدث الذي وقع في هذا التاريخ؟</span>
            <h2 className="text-2xl md:text-3xl font-bold text-white leading-relaxed">
              {currentQ.questionDate}
            </h2>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {currentQ.options.map((optionEvent, idx) => {
              
              let btnStyle = "bg-slate-800 border-slate-700 hover:bg-slate-700 text-slate-200 hover:border-slate-500";
              
              if (isAnswering) {
                if (optionEvent === currentQ.correctEvent) {
                  btnStyle = "bg-emerald-900/50 border-emerald-500 text-emerald-400";
                } else if (optionEvent === selectedAnswer) {
                  btnStyle = "bg-red-900/50 border-red-500 text-red-400";
                } else {
                  btnStyle = "bg-slate-800 border-slate-800 text-slate-500 opacity-50";
                }
              }

              return (
                <button
                  key={idx}
                  onClick={() => handleAnswer(optionEvent)}
                  disabled={isAnswering}
                  className={`p-5 rounded-2xl border-2 text-lg font-bold transition-all duration-300 text-center shadow-sm ${btnStyle}`}
                >
                  {optionEvent}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // عرض التطبيق
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
